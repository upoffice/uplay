name: Extract UPC Protobufs

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: extract-upc-protos
  cancel-in-progress: true

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - id: check
        run: |
          pip install pefile -q
          curl -fsSL -A "Mozilla/5.0" \
            https://static3.cdn.ubi.com/orbit/launcher_installer/UbisoftConnectInstaller.exe \
            -o /tmp/upc.exe
          VERSION=$(python3 .github/version.py /tmp/upc.exe)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          PREVIOUS=$(cat versions/latest.txt 2>/dev/null || true)
          [[ "$PREVIOUS" == "$VERSION" ]] && echo "skip=true" >> "$GITHUB_OUTPUT" || true

      - if: steps.check.outputs.skip != 'true'
        run: |
          go install github.com/dennwc/protod/cmd/protod@latest
          7z x /tmp/upc.exe -o/tmp/upc -y > /dev/null
          mkdir -p protos
          mapfile -t BINS < <(find /tmp/upc -type f \( -iname "*.dll" -o -iname "*.exe" \))
          ~/go/bin/protod -out /tmp/proto_out "${BINS[@]}"
          find /tmp/proto_out -name "*.proto" ! -path "*/google/*" -exec cp {} protos/ \;
          mkdir -p versions && echo "${{ steps.check.outputs.version }}" > versions/latest.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add protos/ versions/
          git diff --cached --quiet || git commit -m "protos: ${{ steps.check.outputs.version }}" && git push
